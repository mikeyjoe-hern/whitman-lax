name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inject password hash
        run: sed -i "s/__PASSWORD_HASH__/${{ secrets.PASSWORD_HASH }}/g" frontend/splash.js
      - name: Inject save token
        run: sed -i "s/__SAVE_TOKEN__/${{ secrets.SAVE_TOKEN }}/g" frontend/save.js
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
